name: Update donations

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Scrape donations
        id: scrape
        run: npm run scrape

      - name: Upload debug artifacts on failure
        if: failure() && steps.scrape.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: scrape-debug-${{ github.run_id }}
          path: debug-out/
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit if changed
        run: |
          if git diff --quiet donations.json; then
            echo "No change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add donations.json
          git commit -m "chore: update donations $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
