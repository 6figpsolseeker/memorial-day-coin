name: Update donations

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Scrape donations
        id: scrape
        run: npm run scrape

      - name: Upload debug artifacts on failure
        if: failure() && steps.scrape.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: scrape-debug-${{ github.run_id }}
          path: debug-out/
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit if changed
        id: commit
        run: |
          if git diff --quiet donations.json; then
            echo "No change."
            echo "did_commit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add donations.json
          git commit -m "chore: update donations $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
          echo "did_commit=true" >> "$GITHUB_OUTPUT"

      - name: Install tweet bot deps
        if: steps.commit.outputs.did_commit == 'true'
        run: npm install twitter-api-v2 --no-audit --no-fund --no-save

      - name: Post update tweet
        if: steps.commit.outputs.did_commit == 'true'
        env:
          DRY_RUN: ${{ vars.TWEET_DRY_RUN || '1' }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: npm run post-tweet
